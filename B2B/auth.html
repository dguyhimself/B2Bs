<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroCrush - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Exact color palette from the main game */
        :root {
            --bg-dark: #07070b;
            --panel-bg: #11121d;
            --panel-border: #23253b;
            --cyan: #26ec00;
            --magenta: #ff00ea;
            --yellow: #ffd500;
            --green: #39ff14;
            --red: #ff3333;
            --text-main: #ffffff;
            --text-dim: #6c6f93;
            --neon-blue: #00f3ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'VT323', monospace;
            height: 100vh;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
        }

        @media (min-width: 768px) { body { max-width: 450px; margin: 0 auto; border: 2px solid var(--panel-border); } }

        .stars-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; background: #020204; }

        .auth-wrapper {
            flex: 1; width: 100%; z-index: 10;
            padding: 30px 20px 20px 20px; 
            display: flex; flex-direction: column; 
        }

        .auth-center-block {
            flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: center;
            gap: 20px; overflow-y: auto; scrollbar-width: none; 
        }
        .auth-center-block::-webkit-scrollbar { display: none; }

        /* Branding */
        .brand-header { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 5px; }
        .brand-icon { 
            width: 65px; height: 65px; background: rgba(0, 243, 255, 0.05); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--cyan); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            color: var(--cyan); margin-bottom: 5px; flex-shrink: 0;
            animation: floatLogo 3s ease-in-out infinite;
        }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        .brand-title { font-family: 'Press Start 2P', monospace; font-size: 16px; text-align: center; line-height: 1.4; color: #fff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        .brand-subtitle { font-size: 18px; color: var(--text-dim); letter-spacing: 2px; }

        /* Sleek Glass Panel for Forms */
        .auth-panel {
            background: rgba(13, 14, 21, 0.7);
            border: none;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Segmented Tabs */
        .auth-tabs { display: flex; background: rgba(0,0,0,0.6); border: 1px solid #1a1c29; border-radius: 6px; padding: 4px; flex-shrink: 0; }
        .auth-tab { flex: 1; text-align: center; font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 12px 0; color: var(--text-dim); cursor: pointer; border-radius: 4px; transition: all 0.2s ease; letter-spacing: 1px; }
        .auth-tab.active { background: #23253b; color: var(--cyan); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

        .auth-form { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.3s ease; }
        .auth-form.active { display: flex; }

        /* Advanced Input Groups */
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .input-label { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--text-dim); letter-spacing: 0.5px; padding-left: 2px; }
        
        .input-wrapper { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--panel-border); border-radius: 6px; 
            padding: 8px 12px; display: flex; align-items: center; transition: all 0.2s ease;
        }
        .input-wrapper:focus-within { border-color: var(--neon-blue); background: rgba(0,0,0,0.7); box-shadow: 0 0 10px rgba(0, 243, 255, 0.1); }
        
        .input-icon { color: var(--text-dim); display: flex; align-items: center; margin-right: 12px; transition: color 0.2s; }
        .input-wrapper:focus-within .input-icon { color: var(--neon-blue); }
        
        .auth-input { 
            flex: 1; background: transparent; border: none; color: white; 
            font-family: 'VT323', monospace; font-size: 20px; padding: 4px 0; outline: none; 
        }
        .auth-input::placeholder { color: #444; }

        /* Password Eye Toggle */
        .pass-toggle { color: var(--text-dim); cursor: pointer; display: flex; align-items: center; margin-left: 10px; transition: color 0.2s; }
        .pass-toggle:hover { color: #fff; }

        .helper-text { font-family: 'VT323', monospace; font-size: 14px; color: #555; text-align: right; margin-top: 0px; margin-bottom: -15px;}

        /* Forgot Password Link */
        .forgot-pass-link { 
            font-family: 'Press Start 2P', monospace; 
            font-size: 7px; 
            color: var(--text-dim); 
            cursor: pointer; 
            transition: all 0.2s ease; 
            letter-spacing: 0.5px;
        }
        .forgot-pass-link:hover { 
            color: var(--neon-blue); 
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5); 
        }

        /* Buttons */
        .btn-submit { 
            width: 100%; padding: 14px; margin-top: 5px;
            background: var(--neon-blue); color: #000; border: none; 
            font-family: 'Press Start 2P', monospace; font-size: 10px; 
            cursor: pointer; border-radius: 6px; 
            box-shadow: 0 4px 0 #008899, 0 0 15px rgba(0, 243, 255, 0.2); 
            transition: all 0.1s ease; letter-spacing: 1px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 5px 0 #008899, 0 0 20px rgba(0, 243, 255, 0.4); }
        .btn-submit:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-submit-green { background: var(--cyan); box-shadow: 0 4px 0 #009926, 0 0 15px rgba(38, 236, 0, 0.2); }
        .btn-submit-green:hover { filter: brightness(1.1); box-shadow: 0 5px 0 #009926, 0 0 20px rgba(38, 236, 0, 0.4); }
        .btn-submit-green:active { box-shadow: none; }

        .btn-subtext { font-size: 14px; font-family: 'VT323', monospace; opacity: 0.8; letter-spacing: 1px; }

        /* Floating Toast Notifications */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }

        .toast {
            padding: 14px 15px; 
            border-radius: 6px; 
            text-align: center;
            font-family: 'Press Start 2P', monospace; 
            font-size: 8px; 
            line-height: 1.5;
            color: #fff;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            animation: slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border: 1px solid transparent;
            letter-spacing: 0.5px;
        }

        .toast.error { background: rgba(20, 2, 2, 0.9); border-color: var(--red); color: var(--red); }
        .toast.success { background: rgba(2, 20, 2, 0.9); border-color: var(--green); color: var(--green); }
        .toast.info { background: rgba(2, 15, 20, 0.9); border-color: var(--cyan); color: var(--neon-blue); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-10px) scale(0.95); }
        }

        /* Trust Badges */
        .trust-badges { 
            display: flex; justify-content: space-between; border-top: 1px dashed var(--panel-border); 
            padding-top: 15px; flex-shrink: 0; 
        }
        .trust-badge { display: flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 16px; font-family: 'VT323', monospace; }
        .trust-badge svg { stroke: var(--text-dim); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Crash-Themed Fullscreen Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(7, 7, 11, 0.95); backdrop-filter: blur(10px);
            z-index: 100000; display: none; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
        }

        .loader-rocket { 
            color: var(--cyan);
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.6));
            animation: blastOff 0.5s ease-in-out infinite alternate; 
        }
        @keyframes blastOff { 
            from { transform: translateY(0) scale(1); } 
            to { transform: translateY(-10px) scale(1.05); } 
        }

        .loader-text { 
            font-family: 'Press Start 2P', monospace; 
            font-size: 10px; color: var(--cyan); 
            letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
            animation: pulseText 1s infinite; 
        }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .loader-bar { 
            width: 200px; height: 4px; background: #1a1c29; 
            border-radius: 4px; overflow: hidden; position: relative;
        }
        .loader-fill { 
            width: 40%; height: 100%; background: var(--cyan); 
            box-shadow: 0 0 10px var(--cyan); position: absolute;
            animation: loadFill 1.5s infinite ease-in-out; 
        }
        @keyframes loadFill { 
            0% { left: -40%; } 
            100% { left: 100%; } 
        }
    </style>
</head>
<body>

    <!-- ADD THIS HERE -->
    <div id="toast-container"></div>

    <!-- Interactive Loading Screen -->
    <div id="loading-overlay">
        <div class="loader-rocket">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
                <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path>
                <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path>
            </svg>
        </div>
        <div id="loader-msg" class="loader-text">PREPARING LAUNCH...</div>
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <div class="stars-bg" id="stars-bg"></div>


    <div class="auth-wrapper">
        <div class="auth-center-block">
            
            <div class="brand-header">
                <div class="brand-icon">
                    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
                        <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
                        <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path>
                        <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path>
                    </svg>
                </div>
                <div class="brand-title">Retro Crush</div>
                <div class="brand-subtitle">WEB3 GAME</div>
            </div>

            <!-- Sleek Glass Form Panel -->
            <div class="auth-panel">
                <div class="auth-tabs">
                    <div class="auth-tab active" id="tab-login" onclick="switchAuthMode('login')">LOGIN</div>
                    <div class="auth-tab" id="tab-register" onclick="switchAuthMode('register')">REGISTER</div>
                </div>

                <!-- LOGIN FORM -->
                <div id="form-login" class="auth-form active">
                    <div class="form-group">
                        <label class="input-label">USERNAME</label>
                        <div class="input-wrapper">
                            <div class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
                            <input type="text" id="login-user" class="auth-input" placeholder="Enter username" maxlength="12" autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">PASSWORD</label>
                        <div class="input-wrapper">
                            <div class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>
                            <input type="password" id="login-pass" class="auth-input" placeholder="Enter password">
                            <div class="pass-toggle" onclick="togglePassword('login-pass', this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                        </div>
                        <!-- Changed margin-top to 4px to give it clean breathing room -->
                        <div style="display: flex; justify-content: flex-end; margin-top: 4px; padding-right: 4px;">
                            <span class="forgot-pass-link" onclick="forgotPassword()">FORGOT PASSWORD?</span>
                        </div>
                    </div>

                    <button class="btn-submit btn-submit-green" onclick="submitAuth('login')">
                        <span>SECURE LOGIN</span>
                        <span class="btn-subtext">Access Vault</span>
                    </button>
                </div>

                <!-- REGISTER FORM -->
                <div id="form-register" class="auth-form">
                    <div class="form-group">
                        <label class="input-label">CHOOSE USERNAME</label>
                        <div class="input-wrapper">
                            <div class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
                            <input type="text" id="reg-user" class="auth-input" placeholder="3-12 Characters" maxlength="12" autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">CREATE PASSWORD</label>
                        <div class="input-wrapper">
                            <div class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>
                            <input type="password" id="reg-pass" class="auth-input" placeholder="Secure Password">
                            <div class="pass-toggle" onclick="togglePassword('reg-pass', this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                        </div>
                        <div class="helper-text">Min 5 characters</div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">REFERRAL CODE</label>
                        <div class="input-wrapper">
                            <div class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg></div>
                            <input type="text" id="reg-ref" class="auth-input" placeholder="Optional" maxlength="12" autocomplete="off">
                        </div>
                    </div>

                    <button class="btn-submit" onclick="submitAuth('register')">
                        <span>CREATE ACCOUNT</span>
                        <span class="btn-subtext">Join Arcade</span>
                    </button>
                </div>
                
            </div>
        </div> 

        <!-- Fixed Trust Badges (Footer) -->
        <div class="trust-badges">
            <div class="trust-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="square"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                PROVABLY FAIR
            </div>
            <div class="trust-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="square"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polyline></svg>
                INSTANT
            </div>
            <div class="trust-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="square"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                AES-256
            </div>
        </div>
    </div>

    

    <script>
        // Generate animated background stars
        const bg = document.getElementById('stars-bg');
        for(let i=0; i<40; i++) {
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.background = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.2})`;
            star.style.borderRadius = '50%';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            
            const duration = Math.random() * 3 + 1;
            star.style.animation = `pulse ${duration}s infinite alternate`;
            bg.appendChild(star);
        }

        const styleSheet = document.createElement("style");
        styleSheet.innerText = `@keyframes pulse { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 0.8; transform: scale(1.2); } }`;
        document.head.appendChild(styleSheet);

        const socket = io();

        if (localStorage.getItem('arcade_token')) {
            window.location.href = '/';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const urlRef = urlParams.get('ref');
        if (urlRef) {
            document.getElementById('reg-ref').value = urlRef.toUpperCase();
            switchAuthMode('register', true); // <-- Add 'true' so it switches tabs silently without crashing the Audio API!
        }

        // --- 8-Bit Audio Engine ---
        let actx = null;

        // Browsers require a user interaction to allow audio. We unlock it on the first click.
        document.body.addEventListener('click', initAudio, { once: true });

        function initAudio() {
            if (!actx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                actx = new AudioContext();
            }
            if (actx.state === 'suspended') actx.resume();
        }

        function playTone(freq, type, duration, vol=0.1) {
            if(!actx) return;
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);
            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + duration);
        }

        function playSfx(type) {
            initAudio(); // Guarantee context is awake
            if(type === 'click') playTone(600, 'square', 0.1, 0.05);
            if(type === 'error') { playTone(150, 'sawtooth', 0.2, 0.1); setTimeout(()=>playTone(100, 'sawtooth', 0.3, 0.1), 150); }
            if(type === 'success') { playTone(523.25, 'square', 0.1); setTimeout(()=>playTone(659.25, 'square', 0.2), 100); setTimeout(()=>playTone(783.99, 'square', 0.3), 200); }
            if(type === 'launch') { playTone(200, 'sawtooth', 0.4, 0.1); setTimeout(()=>playTone(300, 'sawtooth', 0.4, 0.1), 100); }
        }

        // Add sounds to existing functions
        function switchAuthMode(mode, silent = false) {
            if (!silent) playSfx('click'); // <-- Only play the sound if it's an actual click
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');

            document.getElementById('form-login').classList.toggle('active', mode === 'login');
            document.getElementById('form-register').classList.toggle('active', mode === 'register');
        }

        function togglePassword(inputId, iconEl) {
            playSfx('click');
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
                iconEl.style.color = "var(--cyan)";
            } else {
                input.type = "password";
                iconEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
                iconEl.style.color = "var(--text-dim)";
            }
        }

        window.forgotPassword = () => {
            // Play the retro error "buzzer" sound for comedic effect
            playSfx('error');

            // Drop the sarcastic toast down from the top
            setStatus("DUH, YOU SHOULD'VE REMEMBERED IT NIGGA", 'error');
        };

        function setStatus(msg, type) {
            const container = document.getElementById('toast-container');

            // ANTI-SPAM: Check if the exact same message is already visible
            for (let t of container.children) {
                if (t.innerHTML === msg) return; // Ignore the spam click completely
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = msg;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        window.submitAuth = (action) => {
            let u, p, r;
            if (action === 'login') {
                u = document.getElementById('login-user').value.trim();
                p = document.getElementById('login-pass').value.trim();
            } else {
                u = document.getElementById('reg-user').value.trim();
                p = document.getElementById('reg-pass').value.trim();
                r = document.getElementById('reg-ref').value.trim();
            }

            if(!u || !p) { playSfx('error'); return setStatus('PLEASE FILL ALL FIELDS', 'error'); }
            if(u.length < 3) { playSfx('error'); return setStatus('USERNAME MUST BE AT LEAST 3 CHARS', 'error'); }
            if(p.length < 5) { playSfx('error'); return setStatus('PASSWORD MUST BE AT LEAST 5 CHARS', 'error'); }

            // Trigger Loading Overlay & Sound
            playSfx('launch');
            document.getElementById('loader-msg').innerText = action === 'login' ? 'Logging in...' : 'Creating Account...';
            document.getElementById('loading-overlay').style.display = 'flex';

            socket.emit(action, { username: u, password: p, refCode: r });
        };

        socket.on('auth_success', (token) => {
            playSfx('success');
            document.getElementById('loader-msg').innerText = 'Logged in!';
            document.getElementById('loader-msg').style.color = 'var(--green)';
            document.querySelector('.loader-rocket').style.color = 'var(--green)';
            document.querySelector('.loader-fill').style.background = 'var(--green)';

            localStorage.setItem('arcade_token', token);

            // Hold the success screen for a moment before redirecting
            setTimeout(() => { window.location.href = '/'; }, 1200);
        });

        socket.on('auth_error', (msg) => {
            playSfx('error');
            document.getElementById('loading-overlay').style.display = 'none'; // Hide overlay
            setStatus(msg, 'error'); // Show floating error
        });
    </script>
</body>
</html>
